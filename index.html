    <style>

            background: white;
            border-radius: 20px;

        .tab-active {

<body class="p-4 md:p-8 relative">
    <div class="max-w-md mx-auto">
        <div class="card overflow-hidden border border-slate-200">
            <div class="flex border-b border-slate-100 bg-slate-50/50 relative">
                <button onclick="switchMode('calc')" id="tab-calc"

                <button onclick="switchMode('penalty')" id="tab-penalty"

            </div>

            <div class="p-6">
                <div class="flex justify-end mb-4">
                    <div class="flex bg-slate-100 p-1 rounded-lg">
                        <button onclick="setYearMode('CE')" id="btn-ce"

                        <button onclick="setYearMode('ROC')" id="btn-roc"
                            class="px-3 py-1 rounded text-xs font-bold text-slate-400 transition-all">民國</button>
                    </div>
                </div>

                <div id="type-selector" class="mb-6">
                    <label class="block text-xs font-black text-slate-400 mb-2 uppercase tracking-wider">案件性質</label>
                    <div class="flex bg-slate-100 p-1 rounded-xl">
                        <button onclick="setType('normal')" id="btn-normal"
                            class="btn-active flex-1 py-2 rounded-lg text-sm font-bold transition-all">一般案件</button>
                        <button onclick="setType('adverse')" id="btn-adverse"
                            class="flex-1 py-2 rounded-lg text-sm font-bold text-slate-500 transition-all">不利處分</button>
                    </div>
                    <p id="type-desc" class="text-[10px] text-slate-400 mt-2 italic">※ 一般案件：末日遇假日順延。</p>
                    <p class="text-[10px] text-slate-400 mt-1 italic">※ 國定假日（2018~2026) 其餘計算六日。</p>
                </div>

                <hr id="divider" class="mb-6 border-slate-100">

                <div id="section-calc" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">入境日</label>
                        <input type="hidden" id="startDate" class="auto-calc">

                        <div id="startDate_ce_group"
                            class="hidden flex items-center border border-slate-200 rounded-xl bg-white overflow-hidden w-full focus-within:ring-2 focus-within:ring-blue-500">
                            <span class="pl-3 text-slate-400 text-sm font-bold whitespace-nowrap">西元</span>
                            <input type="number" id="startDate_ce_y"
                                class="auto-calc-ce w-full p-3 outline-none text-center" placeholder="年">
                            <span class="text-slate-200">/</span>
                            <input type="number" id="startDate_ce_m"
                                class="auto-calc-ce w-full p-3 outline-none text-center" placeholder="月">
                            <span class="text-slate-200">/</span>
                            <input type="number" id="startDate_ce_d"
                                class="auto-calc-ce w-full p-3 outline-none text-center" placeholder="日">
                            <button onclick="openCalendar('startDate_ce')"
                                class="px-3 py-3 text-slate-400 hover:text-blue-600 bg-slate-50 border-l border-slate-100 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">

                            <span class="pl-3 text-slate-400 text-sm font-bold whitespace-nowrap">民國</span>

                            <span class="text-slate-200">/</span>

                            <button onclick="openCalendar('startDate_roc')"

                        <div id="date-start_roc_group"

                            <span class="pl-3 text-slate-400 text-sm font-bold whitespace-nowrap">民國</span>
                            <input type="number" id="date-start_roc_y"
                                class="auto-penalty-roc w-full p-3 outline-none text-center" placeholder="年">
                            <span class="text-slate-200">/</span>
                            <input type="number" id="date-start_roc_m"
                                class="auto-penalty-roc w-full p-3 outline-none text-center" placeholder="月">
                            <span class="text-slate-200">/</span>
                            <input type="number" id="date-start_roc_d"
                                class="auto-penalty-roc w-full p-3 outline-none text-center" placeholder="日">
                            <button onclick="openCalendar('date-start_roc')"
                                class="px-3 py-3 text-slate-400 hover:text-blue-600 bg-slate-50 border-l border-slate-100 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                                    </path>

                    <div>

                            <span class="pl-3 text-slate-400 text-sm font-bold whitespace-nowrap">民國</span>
                            <input type="number" id="date-end_roc_y"
                                class="auto-penalty-roc w-full p-3 outline-none text-center" placeholder="年">
                            <span class="text-slate-200">/</span>
                            <input type="number" id="date-end_roc_m"
                                class="auto-penalty-roc w-full p-3 outline-none text-center" placeholder="月">
                            <span class="text-slate-200">/</span>
                            <input type="number" id="date-end_roc_d"
                                class="auto-penalty-roc w-full p-3 outline-none text-center" placeholder="日">
                            <button onclick="openCalendar('date-end_roc')"
                                class="px-3 py-3 text-slate-400 hover:text-blue-600 bg-slate-50 border-l border-slate-100 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                <div id="result-area" class="mt-8 hidden border-t border-dashed pt-6">
                    <div id="status-card" class="p-5 rounded-2xl transition-all">
                        <div id="res-title" class="text-[10px] font-black uppercase tracking-widest mb-1"></div>
                        <div id="res-main" class="text-3xl font-black"></div>
                        <div id="res-sub" class="text-sm font-bold mt-1"></div>
                        <div id="res-total-days" class="text-xs font-bold mt-2 text-slate-600"></div>

    <div id="calendar-modal"
        class="hidden fixed inset-0 bg-slate-900/40 z-50 flex items-start justify-center px-4 pt-[15vh] pb-8 backdrop-blur-sm">
        <div id="calendar-card" class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden modal-enter">
            <div class="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50">
                <button onclick="changeCalMonth(-1)"
                    class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-500 hover:bg-white hover:shadow-sm transition-all">&lt;</button>
                <div id="cal-title" class="font-bold text-slate-800 text-lg tracking-wider"></div>
                <button onclick="changeCalMonth(1)"
                    class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-500 hover:bg-white hover:shadow-sm transition-all">&gt;</button>
            </div>
            <div class="p-4">
                <div class="grid grid-cols-7 text-center text-xs font-bold text-slate-400 mb-2">
                    <div class="text-rose-400">日</div>
                    <div>一</div>
                    <div>二</div>
                    <div>三</div>
                    <div>四</div>
                    <div>五</div>
                    <div class="text-emerald-500">六</div>
                </div>
                <div id="cal-days" class="grid grid-cols-7 gap-y-1 gap-x-1 text-slate-700"></div>
            </div>
            <div class="p-3 border-t border-slate-100 text-right bg-slate-50">
                <button onclick="closeCalendar()"
                    class="px-5 py-2 rounded-lg text-sm font-bold text-slate-500 hover:bg-slate-200 transition-colors">取消</button>
            </div>
        </div>
    </div>

    <script>
        let HOLIDAY_DATA = {};

        let currentType = 'normal', currentMode = 'calc', yearMode = 'ROC';
        const weekNames = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        const dateFieldIDs = ['startDate', 'date-start', 'date-end'];

        let calTargetPrefix = '';
        let calIsROC = true;
        let calViewYear = 115;
        let calViewMonth = 1;

        function setYearMode(mode) {
            yearMode = mode;
            document.getElementById('btn-ce').className = mode === 'CE' ? 'px-3 py-1 rounded text-xs font-bold bg-white shadow-sm text-slate-700 transition-all' : 'px-3 py-1 rounded text-xs font-bold text-slate-400 transition-all';
            document.getElementById('btn-roc').className = mode === 'ROC' ? 'px-3 py-1 rounded text-xs font-bold bg-white shadow-sm text-slate-700 transition-all' : 'px-3 py-1 rounded text-xs font-bold text-slate-400 transition-all';

            dateFieldIDs.forEach(id => {
                document.getElementById(id + '_ce_group').classList.toggle('hidden', mode === 'ROC');
                document.getElementById(id + '_roc_group').classList.toggle('hidden', mode === 'CE');
            });
            triggerCalc();
        }

        function syncDate(id, source) {
            const yEl = document.getElementById(id + '_' + source.toLowerCase() + '_y');
            const mEl = document.getElementById(id + '_' + source.toLowerCase() + '_m');
            const dEl = document.getElementById(id + '_' + source.toLowerCase() + '_d');
            
            if (!yEl || !mEl || !dEl) return;

            const y = parseInt(yEl.value);
            const m = parseInt(mEl.value);
            const d = parseInt(dEl.value);

            // 如果任一欄位空白，清空隱藏欄位並隱藏結果
            if (isNaN(y) || isNaN(m) || isNaN(d)) {
                document.getElementById(id).value = '';
                document.getElementById('result-area').classList.add('hidden');
                return;
            }

            if (source === 'CE') {
                const ceM = ('0' + m).slice(-2);
                const ceD = ('0' + d).slice(-2);
                document.getElementById(id).value = `${y}-${ceM}-${ceD}`;

                document.getElementById(id + '_roc_y').value = y - 1911;
                document.getElementById(id + '_roc_m').value = m;
                document.getElementById(id + '_roc_d').value = d;
            } else {
                const ceY = y + 1911;
                const ceM = ('0' + m).slice(-2);
                const ceD = ('0' + d).slice(-2);
                document.getElementById(id).value = `${ceY}-${ceM}-${ceD}`;

                document.getElementById(id + '_ce_y').value = ceY;
                document.getElementById(id + '_ce_m').value = m;
                document.getElementById(id + '_ce_d').value = d;
            }
        }

        function triggerCalc() {
            if (currentMode === 'calc') runCalc(); else runPenalty();
        }

        function switchMode(m) {
            currentMode = m;
            document.getElementById('section-calc').classList.toggle('hidden', m !== 'calc');
            document.getElementById('section-penalty').classList.toggle('hidden', m !== 'penalty');
            document.getElementById('type-selector').classList.toggle('hidden', m !== 'calc');
            document.getElementById('divider').classList.toggle('hidden', m !== 'calc');

            document.getElementById('tab-calc').className = m === 'calc' ? 'flex-1 py-4 text-sm font-bold tab-active' : 'flex-1 py-4 text-sm font-bold text-slate-400';
            document.getElementById('tab-penalty').className = m === 'penalty' ? 'flex-1 py-4 text-sm font-bold tab-active' : 'flex-1 py-4 text-sm font-bold text-slate-400';
            triggerCalc();
        }

        function setType(t) {
            currentType = t;
            document.getElementById('btn-normal').className = t === 'normal' ? 'btn-active flex-1 py-2 rounded-lg text-sm font-bold transition-all' : 'flex-1 py-2 rounded-lg text-sm font-bold text-slate-500';
            document.getElementById('btn-adverse').className = t === 'adverse' ? 'btn-active flex-1 py-2 rounded-lg text-sm font-bold transition-all' : 'flex-1 py-2 rounded-lg text-sm font-bold text-slate-500';
            document.getElementById('type-desc').innerText = t === 'normal' ? "※ 一般案件：末日遇假日順延。" : "※ 不利處分：始日計入且不順延。";
            runCalc();
        }

        function isHoliday(date) {
            const y = date.getFullYear(), m = date.getMonth(), d = date.getDate();
            if (HOLIDAY_DATA[y]) return HOLIDAY_DATA[y][m].charAt(d - 1) === "1";
            return (date.getDay() === 0 || date.getDay() === 6);
        }

        function getLocalDateStr(date) {
            let y = date.getFullYear();
            let m = ('0' + (date.getMonth() + 1)).slice(-2);
            let d = ('0' + date.getDate()).slice(-2);
            if (yearMode === 'ROC') return `${y - 1911}-${m}-${d}`;
            return `${y}-${m}-${d}`;
        }

        // 共用：解析 'YYYY-MM-DD' 字串為 Date，並驗證有效性
        function parseDate(str) {
            if (!str) return null;
            const [y, m, d] = str.split('-').map(Number);
            const date = new Date(y, m - 1, d);
            if (date.getFullYear() !== y || date.getMonth() !== m - 1 || date.getDate() !== d) return null;
            return date;
        }

        function getEquivalentDate(start, addedMonths) {
            let y = start.getFullYear() + Math.floor((start.getMonth() + addedMonths) / 12);
            let m = (start.getMonth() + addedMonths) % 12;
            let d = start.getDate();
            let temp = new Date(y, m, d);
            if (temp.getMonth() !== m) temp = new Date(y, m + 1, 0);
            return temp;
        }

        function runCalc() {
            const s = document.getElementById('startDate').value;
            if (!s) return;
            const p = parseInt(document.getElementById('periodValue').value);
            const u = document.getElementById('periodUnit').value;
            if (isNaN(p)) return;

            const start = parseDate(s);
            if (!start) {
                document.getElementById('result-area').classList.add('hidden');
                return;
            }
            
            let end;
            let detail;

            if (currentType === 'normal') {
                if (u === 'day') {
                    end = new Date(start);
                    end.setDate(end.getDate() + p);
                } else if (u === 'month') {
                    end = getEquivalentDate(start, p);
                } else {
                    end = getEquivalentDate(start, p * 12);
                }
                
                let skip = 0;
                while (isHoliday(end)) { end.setDate(end.getDate() + 1); skip++; }
                detail = `一般案件：始日不計。` + (skip > 0 ? ` 末日逢假日順延 ${skip} 天。` : "");
            } else {
                if (u === 'day') {
                    end = new Date(start);
                    end.setDate(end.getDate() + (p - 1));
                } else {
                    end = getEquivalentDate(start, u === 'month' ? p : p * 12);
                    end.setDate(end.getDate() - 1);
                }
                detail = "不利處分：始日計入，不順延。";
            }

            const actualStart = new Date(start);
            if (currentType === 'normal') actualStart.setDate(actualStart.getDate() + 1);

            const total = Math.round((end - actualStart) / 864e5) + 1;
            showResult("屆滿日期 (末日)", getLocalDateStr(end) + `, 共 ${total} 日`, weekNames[end.getDay()], detail, "blue", ``);
        }

        function runPenalty() {
            const v1 = document.getElementById('date-start').value;
            const v2 = document.getElementById('date-end').value;
            if (!v1 || !v2) return;

            const start = parseDate(v1);
            const end = parseDate(v2);
            if (!start || !end) return;

            if (start > end) return showResult("錯誤", "日期順序有誤", "", "起算日不可晚於受理日", "rose", "");

            let totalMonths = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
            let tempDate = getEquivalentDate(start, totalMonths);
            if (tempDate > end) { totalMonths--; tempDate = getEquivalentDate(start, totalMonths); }

            let years = Math.floor(totalMonths / 12), months = totalMonths % 12;
            let remainDays = Math.round((end - tempDate) / 864e5) + 1;

            let resStr = "";
            if (years > 0) resStr += years + "年";
            if (months > 0) resStr += months + "個月";
            if (remainDays > 0 || resStr === "") resStr += remainDays + "日";

            let detailHtml = "";
            if (totalMonths > 0) {
                let endOfPeriod = new Date(tempDate);
                endOfPeriod.setDate(endOfPeriod.getDate() - 1);
                detailHtml += `計算期間應自起算日(${start.getMonth() + 1}月${start.getDate()}日)相當日(${tempDate.getMonth() + 1}月${tempDate.getDate()}日)之前一日(${endOfPeriod.getMonth() + 1}月${endOfPeriod.getDate()}日)為期間之末日。\n\n`;
                detailHtml += `因此，${getLocalDateStr(start)} ～ ${getLocalDateStr(endOfPeriod)} 為${years > 0 ? years + '年' : ''}${months > 0 ? months + '個月' : ''}。\n`;
                if (remainDays > 0) detailHtml += `${getLocalDateStr(tempDate)} ～ ${getLocalDateStr(end)} 計 ${remainDays} 日。`;
            } else {
                detailHtml += `起算日為 ${getLocalDateStr(start)}，至 ${getLocalDateStr(end)}，不足 1 個月。\n共計 ${remainDays} 日。`;
            }
            showResult("計算結果", resStr, ``, detailHtml, "emerald", "");
        }

        function showResult(t, m, s, d, color, total) {
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('res-title').innerText = t;
            document.getElementById('res-main').innerText = m;
            document.getElementById('res-sub').innerText = s;
            document.getElementById('res-detail').innerText = d;

            const tBox = document.getElementById('res-total-days');
            tBox.innerText = total || "";
            tBox.classList.toggle('hidden', !total);
            const themes = { blue: "bg-blue-50 text-blue-700 border-blue-100", rose: "bg-rose-50 text-rose-700 border-rose-100", emerald: "bg-emerald-50 text-emerald-700 border-emerald-100" };
            document.getElementById('status-card').className = `p-5 rounded-2xl border ${themes[color]}`;
        }

        function openCalendar(targetPrefix) {
            calTargetPrefix = targetPrefix;
            calIsROC = targetPrefix.endsWith('_roc');

            const inputY = document.getElementById(targetPrefix + '_y').value;
            const inputM = document.getElementById(targetPrefix + '_m').value;

            if (inputY && inputM) {
                calViewYear = parseInt(inputY);
                calViewMonth = parseInt(inputM);
            } else {
                const now = new Date();
                calViewYear = calIsROC ? (now.getFullYear() - 1911) : now.getFullYear();
                calViewMonth = now.getMonth() + 1;
            }

            renderCalendar();

            const modal = document.getElementById('calendar-modal');
            const card = document.getElementById('calendar-card');
            modal.classList.remove('hidden');

            card.classList.remove('modal-enter-active');
            void card.offsetWidth;
            card.classList.add('modal-enter-active');
        }

        function closeCalendar() {
            document.getElementById('calendar-modal').classList.add('hidden');
        }

        function changeCalMonth(delta) {
            calViewMonth += delta;
            if (calViewMonth > 12) { calViewMonth = 1; calViewYear++; }
            if (calViewMonth < 1) { calViewMonth = 12; calViewYear--; }
            renderCalendar();
        }

        function renderCalendar() {
            const ceYear = calIsROC ? calViewYear + 1911 : calViewYear;
            const firstDay = new Date(ceYear, calViewMonth - 1, 1).getDay();
            const daysInMonth = new Date(ceYear, calViewMonth, 0).getDate();

            const titlePrefix = calIsROC ? '民國' : '西元';
            document.getElementById('cal-title').innerText = `${titlePrefix} ${calViewYear} 年 ${calViewMonth} 月`;

            let html = '';
            for (let i = 0; i < firstDay; i++) {
                html += `<div></div>`;
            }

            // 將 DOM 讀取移出迴圈，避免每次迭代重複查詢
            const selY = parseInt(document.getElementById(calTargetPrefix + '_y').value);
            const selM = parseInt(document.getElementById(calTargetPrefix + '_m').value);
            const selD = parseInt(document.getElementById(calTargetPrefix + '_d').value);

            for (let d = 1; d <= daysInMonth; d++) {
                const isSelected = (selY === calViewYear && selM === calViewMonth && selD === d);
                const bgClass = isSelected ? "bg-blue-600 text-white shadow-md" : "hover:bg-blue-50 text-slate-700";
                html += `<div class="cursor-pointer rounded-full flex items-center justify-center aspect-square text-sm font-semibold transition-all ${bgClass}" onclick="selectDate(${calViewYear}, ${calViewMonth}, ${d})">${d}</div>`;
            }
            document.getElementById('cal-days').innerHTML = html;
        }

        function selectDate(y, m, d) {
            document.getElementById(calTargetPrefix + '_y').value = y;
            document.getElementById(calTargetPrefix + '_m').value = m;
            document.getElementById(calTargetPrefix + '_d').value = d;

            const baseId = calTargetPrefix.replace('_roc', '').replace('_ce', '');
            const sourceMode = calIsROC ? 'ROC' : 'CE';

            syncDate(baseId, sourceMode);
            triggerCalc();
            closeCalendar();
        }

        // 改用 DOMContentLoaded（不需等待圖片等資源）
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('holiday.json');
                if (response.ok) {
                    HOLIDAY_DATA = await response.json();
                } else {
                    console.error("holiday.json 載入失敗: 找不到檔案或發生錯誤");
                }
            } catch (error) {
                console.error("holiday.json 載入例外:", error);
            }

            const today = new Date();
            const y = today.getFullYear();
            const m = today.getMonth() + 1;
            const d = today.getDate();

            dateFieldIDs.forEach(id => {
                document.getElementById(id + '_ce_y').value = y;
                document.getElementById(id + '_ce_m').value = m;
                document.getElementById(id + '_ce_d').value = d;
                syncDate(id, 'CE');
            });

            document.querySelectorAll('.auto-calc-ce').forEach(el => el.addEventListener('input', () => {
                syncDate('startDate', 'CE');
                triggerCalc();
            }));

            // 改用正規表達式截取 baseId，更穩健可靠
            document.querySelectorAll('.auto-penalty-ce').forEach(el => el.addEventListener('input', (e) => {
                const baseId = e.target.id.replace(/_(ce|roc)_(y|m|d)$/, '');
                syncDate(baseId, 'CE');
                triggerCalc();
            }));

            document.querySelectorAll('.auto-calc-roc').forEach(el => el.addEventListener('input', () => {
                syncDate('startDate', 'ROC');
                triggerCalc();
            }));

            document.querySelectorAll('.auto-penalty-roc').forEach(el => el.addEventListener('input', (e) => {
                const baseId = e.target.id.replace(/_(ce|roc)_(y|m|d)$/, '');
                syncDate(baseId, 'ROC');
                triggerCalc();
            }));

            document.querySelectorAll('.auto-calc').forEach(el => {
                if (el.type !== 'hidden') el.addEventListener('input', triggerCalc);
            });

            setYearMode('ROC');
        });
    </script>
</body>

</html>
